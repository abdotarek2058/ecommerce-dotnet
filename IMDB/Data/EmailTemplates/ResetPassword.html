<div style="font-family:Arial,sans-serif; background:#f4f6f9; padding:30px">

    <div style="max-width:500px; margin:auto; background:white; border-radius:12px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.1);">

        <!-- Header -->
        <div style="background:#dc3545; padding:20px; text-align:center; color:white;">
            <h2 style="margin:0;">🔐 Reset Password</h2>
        </div>

        <!-- Body -->
        <div style="padding:25px;">

            <h3>Hello {{NAME}} 👋</h3>

            <p style="color:#555;">
                We received a request to reset your password.
            </p>

            <p style="font-size:15px;">
                Click the button below to set a new password:
            </p>

            <!-- Button -->
            <div style="text-align:center; margin:30px 0;">
                <a href="{{LINK}}"
                   style="background:#dc3545; color:white; padding:12px 25px; text-decoration:none; border-radius:6px; display:inline-block; font-weight:bold;">
                    Reset Password
                </a>
            </div>

            <p style="font-size:13px; color:#888;">
                This link will expire in a short time for security reasons.
            </p>

        </div>

        <!-- Footer -->
        <div style="background:#f8f9fa; text-align:center; padding:15px; font-size:12px; color:#888;">
            If you didn’t request a password reset, you can safely ignore this email.
        </div>

    </div>
</div>
