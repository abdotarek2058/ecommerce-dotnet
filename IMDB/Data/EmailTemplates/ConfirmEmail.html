<div style="margin:0; padding:0; background:#f4f6f9; font-family:Arial, sans-serif;">
    <div style="max-width:600px; margin:40px auto; background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 5px 15px rgba(0,0,0,0.05);">

        <!-- Header -->
        <div style="background:#0d6efd; padding:20px; text-align:center;">
            <h2 style="color:#fff; margin:0;">🎬 IMDB</h2>
        </div>

        <!-- Body -->
        <div style="padding:30px; text-align:center;">
            <h3 style="margin-bottom:10px;">
                Welcome <span style="font-weight:bold; color:#0d6efd;">{{NAME}}</span> 👋
            </h3>

            <p style="color:#555; font-size:15px; margin-bottom:20px;">
                Thanks for joining IMDB! We're excited to have you 🎉
            </p>

            <p style="color:#666; font-size:14px;">
                Please confirm your email address to activate your account.
            </p>

            <!-- Button -->
            <div style="margin:30px 0;">
                <a href="{{LINK}}"
                   style="background:#0d6efd; color:#fff; padding:12px 30px; border-radius:8px; text-decoration:none; font-size:15px; display:inline-block;">
                    Confirm Email
                </a>
            </div>

            <p style="font-size:13px; color:#888;">
                This link will expire in 24 hours for security reasons.
            </p>
        </div>

        <!-- Footer -->
        <div style="background:#f1f1f1; padding:15px; text-align:center;">
            <p style="font-size:12px; color:#888; margin:0;">
                If you didn’t create this account, you can safely ignore this email.
            </p>
        </div>

    </div>
</div>
