<div style="font-family:Arial; background:#f6f6f6; padding:30px">
    <div style="max-width:500px; margin:auto; background:white; padding:25px; border-radius:10px">

        <h2 style="color:#0d6efd; text-align:center">🎬 IMDB</h2>

        <h3>Hello {{NAME}} 👋</h3>

        <p>Thank you for your order!</p>

        <p style="font-size:15px; color:#555">
            Your order <strong>#{{ORDERID}}</strong> has been placed successfully 🎉
        </p>

        <p style="font-size:13px; color:#888; margin-top:5px;">
            Order Date: <strong>{{DATE}}</strong>
        </p>

        <table style="width:100%; border-collapse:collapse; margin-top:20px">
            <thead>
                <tr style="background:#f1f1f1;">
                    <th style="padding:10px; text-align:left;">Movie</th>
                    <th style="padding:10px; text-align:center;">Qty</th>
                    <th style="padding:10px; text-align:right;">Price</th>
                </tr>
            </thead>
            <tbody>
                {{ITEMS}}
            </tbody>
        </table>

        <p style="text-align:right; font-size:16px; margin-top:15px;">
            <strong>Total: {{TOTAL}} EGP</strong>
        </p>

        <div style="text-align:center; margin:25px 0">
            <a href="{{LINK}}"
               style="display:inline-block; padding:12px 25px; background:#0d6efd; color:white; text-decoration:none; border-radius:6px; font-weight:bold">
                View Order
            </a>
        </div>

        <hr />

        <p style="font-size:12px; color:#888; text-align:center">
            If you didn’t request this, ignore this email.
        </p>

    </div>
</div>
